name: CI

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - uses: actions/checkout@v6

      - name: Install pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build library
        run: pnpm -C packages/short-form-view build

      - name: Typecheck
        run: pnpm typecheck

      - name: Unit tests
        run: pnpm -C packages/short-form-view test:run

      - name: Install Playwright browser
        run: pnpm -C examples/next-demo exec playwright install --with-deps chromium

      - name: E2E tests
        run: pnpm -C examples/next-demo test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: |
            examples/next-demo/playwright-report
            examples/next-demo/test-results
          if-no-files-found: ignore
