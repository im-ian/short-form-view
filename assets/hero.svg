<svg width="1280" height="480" viewBox="0 0 1280 480" fill="none" xmlns="http://www.w3.org/2000/svg" font-family="Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif">
  <defs>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#7c5cff"/>
      <stop offset="0.55" stop-color="#5b8bff"/>
      <stop offset="1" stop-color="#19d3ff"/>
    </linearGradient>
    <linearGradient id="card1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#ff5d8f"/>
      <stop offset="1" stop-color="#7c5cff"/>
    </linearGradient>
    <linearGradient id="card2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#19d3ff"/>
      <stop offset="1" stop-color="#5b6bff"/>
    </linearGradient>
    <linearGradient id="title" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#b9c7ff"/>
    </linearGradient>
    <radialGradient id="glow" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#5b6bff" stop-opacity="0.55"/>
      <stop offset="1" stop-color="#5b6bff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="0.5" cy="0.5" r="0.5">
      <stop offset="0" stop-color="#19d3ff" stop-opacity="0.35"/>
      <stop offset="1" stop-color="#19d3ff" stop-opacity="0"/>
    </radialGradient>
    <pattern id="dots" width="26" height="26" patternUnits="userSpaceOnUse">
      <circle cx="1.4" cy="1.4" r="1.4" fill="#ffffff" fill-opacity="0.05"/>
    </pattern>
    <clipPath id="screen"><rect x="886" y="96" width="188" height="328" rx="26"/></clipPath>
    <filter id="soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
    <filter id="drop" x="-30%" y="-30%" width="160%" height="160%">
      <feDropShadow dx="0" dy="22" stdDeviation="34" flood-color="#000000" flood-opacity="0.55"/>
    </filter>
  </defs>

  <!-- background -->
  <rect width="1280" height="480" fill="#0a0b10"/>
  <rect width="1280" height="480" fill="url(#dots)"/>
  <ellipse cx="1010" cy="120" rx="520" ry="360" fill="url(#glow)" filter="url(#soft)"/>
  <ellipse cx="700" cy="470" rx="420" ry="240" fill="url(#glow2)" filter="url(#soft)"/>
  <rect x="0.5" y="0.5" width="1279" height="479" rx="0" fill="none" stroke="#ffffff" stroke-opacity="0.06"/>

  <!-- left: copy -->
  <g>
    <text x="92" y="120" fill="#19d3ff" font-size="14" font-weight="700" letter-spacing="4">REACT · TYPESCRIPT · ZERO-DEPENDENCY</text>
    <text x="88" y="206" fill="url(#title)" font-size="78" font-weight="800" letter-spacing="-2">short-form-view</text>
    <text x="92" y="262" fill="#aab2c8" font-size="23" font-weight="500">Instagram / TikTok-style vertical swipe pager.</text>
    <text x="92" y="296" fill="#7e8aa8" font-size="20" font-weight="500">Swipe up, next clip — smooth, virtualized, SSR-safe.</text>

    <!-- feature pills -->
    <g font-size="14" font-weight="600">
      <g>
        <rect x="92" y="332" width="146" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="url(#accent)" stroke-opacity="0.6"/>
        <text x="165" y="354" fill="#dfe5f5" text-anchor="middle">configurable swipe</text>
      </g>
      <g>
        <rect x="248" y="332" width="112" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="url(#accent)" stroke-opacity="0.6"/>
        <text x="304" y="354" fill="#dfe5f5" text-anchor="middle">virtualized</text>
      </g>
      <g>
        <rect x="370" y="332" width="100" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="url(#accent)" stroke-opacity="0.6"/>
        <text x="420" y="354" fill="#dfe5f5" text-anchor="middle">SSR-safe</text>
      </g>
      <g>
        <rect x="92" y="376" width="120" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="url(#accent)" stroke-opacity="0.6"/>
        <text x="152" y="398" fill="#dfe5f5" text-anchor="middle">press-hold</text>
      </g>
      <g>
        <rect x="222" y="376" width="150" height="34" rx="17" fill="#ffffff" fill-opacity="0.04" stroke="url(#accent)" stroke-opacity="0.6"/>
        <text x="297" y="398" fill="#dfe5f5" text-anchor="middle">append-safe feed</text>
      </g>
    </g>
  </g>

  <!-- right: phone swiping from one video to the next -->
  <g filter="url(#drop)">
    <rect x="872" y="80" width="216" height="360" rx="38" fill="#13141b" stroke="url(#accent)" stroke-width="2"/>
  </g>
  <rect x="886" y="96" width="188" height="328" rx="26" fill="#0d0e14"/>

  <g clip-path="url(#screen)">
    <!-- current video (Clip 12) sliding up, clipped at top -->
    <rect x="886" y="24" width="188" height="278" rx="20" fill="url(#card1)"/>
    <circle cx="980" cy="186" r="30" fill="#ffffff" fill-opacity="0.18"/>
    <path d="M971 170 l24 16 -24 16 z" fill="#ffffff"/>
    <rect x="902" y="270" width="64" height="6" rx="3" fill="#ffffff" fill-opacity="0.5"/>
    <text x="902" y="294" fill="#ffffff" font-size="15" font-weight="700">Clip 12</text>

    <!-- next video (Clip 13) coming up from below, peeking -->
    <rect x="886" y="314" width="188" height="240" rx="20" fill="url(#card2)"/>
    <circle cx="980" cy="392" r="24" fill="#ffffff" fill-opacity="0.18"/>
    <path d="M973 380 l18 12 -18 12 z" fill="#ffffff"/>
    <text x="902" y="350" fill="#ffffff" font-size="14" font-weight="700">Clip 13</text>

    <!-- status bar -->
    <text x="902" y="118" fill="#ffffff" font-size="11" font-weight="700" font-family="ui-monospace, monospace">9:41</text>
    <rect x="1034" y="110" width="28" height="9" rx="3" fill="#ffffff" fill-opacity="0.55"/>

    <!-- pagination dots -->
    <circle cx="1058" cy="172" r="3.4" fill="#ffffff"/>
    <circle cx="1058" cy="188" r="3" fill="#ffffff" fill-opacity="0.4"/>
    <circle cx="1058" cy="204" r="3" fill="#ffffff" fill-opacity="0.4"/>
  </g>

  <!-- swipe-up indicator -->
  <g opacity="0.92">
    <circle cx="980" cy="246" r="22" fill="#0a0b10" fill-opacity="0.55" stroke="#ffffff" stroke-opacity="0.85" stroke-width="1.5"/>
    <path d="M980 256 l0 -20 M972 244 l8 -8 8 8" stroke="#ffffff" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>

  <!-- labels: now playing -> next clip -->
  <g font-size="13" font-weight="700">
    <line x1="872" y1="170" x2="812" y2="170" stroke="#ff5d8f" stroke-opacity="0.5" stroke-width="1.5"/>
    <g>
      <rect x="678" y="154" width="134" height="32" rx="16" fill="#13141b" stroke="#ff5d8f" stroke-opacity="0.7"/>
      <circle cx="696" cy="170" r="4" fill="#ff5d8f"/>
      <text x="710" y="175" fill="#e7ecf8">now playing</text>
    </g>

    <line x1="1088" y1="372" x2="1132" y2="372" stroke="#19d3ff" stroke-opacity="0.5" stroke-width="1.5"/>
    <g>
      <rect x="1126" y="356" width="104" height="32" rx="16" fill="#13141b" stroke="#19d3ff" stroke-opacity="0.7"/>
      <circle cx="1144" cy="372" r="4" fill="#19d3ff"/>
      <text x="1158" y="377" fill="#e7ecf8">next clip</text>
    </g>
  </g>
</svg>
